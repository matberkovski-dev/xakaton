<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Вход — Инженерный Хакатон</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Exo+2:wght@400;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#07101a;color:#e2e8f0;font-family:'Exo 2',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center}
.card{background:#0f1c2a;border:1px solid #1e3a5f;border-radius:16px;padding:40px;width:380px;box-shadow:0 20px 60px rgba(0,0,0,.6)}
h1{font-family:'Orbitron',sans-serif;font-size:18px;font-weight:900;color:#00d4ff;margin-bottom:6px;text-align:center}
.sub{color:#4a6080;font-size:13px;text-align:center;margin-bottom:28px}
label{display:block;font-size:11px;color:#4a6080;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
input{width:100%;padding:12px 14px;background:rgba(255,255,255,.05);border:1px solid #1e3a5f;border-radius:9px;color:#e2e8f0;font-family:'Exo 2',sans-serif;font-size:15px;outline:none;margin-bottom:16px}
input:focus{border-color:#00d4ff}
button{width:100%;padding:14px;background:linear-gradient(135deg,#00d4ff,#007090);border:none;border-radius:9px;color:#000;font-family:'Orbitron',sans-serif;font-size:13px;font-weight:700;cursor:pointer;letter-spacing:1px;margin-top:4px}
button:hover{opacity:.9}
.err{background:rgba(255,107,53,.1);border:1px solid #ff6b35;color:#ff6b35;border-radius:8px;padding:10px 14px;margin-bottom:16px;font-size:13px}
</style>
</head>
<body>
<div class="card">
  <h1>🏗️ ИНЖЕНЕРНЫЙ ХАКАТОН</h1>
  <div class="sub">Система управления квестом</div>
  {% if error %}<div class="err">{{ error }}</div>{% endif %}
  <form method="post" action="/login">
    <label>Логин команды</label>
    <input name="login" placeholder="Название команды" autofocus>
    <label>Пароль</label>
    <input name="password" type="password" placeholder="••••••">
    <button type="submit">ВОЙТИ</button>
  </form>
</div>
</body>
</html>
